<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inbox — Vaneet's Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0912; --text:#f5f6fa; --muted:#a6acc2; --dim:#676d87;
    --border:rgba(255,255,255,0.14); --cyan:#22d3ee; --violet:#8b5cf6; --pink:#ec4899;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif; padding:40px 24px;
  }
  h1{font-family:'Sora',sans-serif; font-size:1.6rem; margin-bottom:6px;}
  .sub{color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:12.5px; margin-bottom:32px;}
  .wrap{max-width:820px; margin:0 auto;}
  .card{
    background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:16px;
    padding:22px 24px; margin-bottom:16px;
  }
  .card .top{display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; margin-bottom:10px;}
  .card .name{font-weight:600;}
  .card .email{color:var(--cyan); font-size:13.5px; margin-left:8px;}
  .card .date{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--dim);}
  .card .msg{color:var(--muted); font-size:14.5px; white-space:pre-wrap;}
  .empty, .error{color:var(--dim); font-family:'JetBrains Mono',monospace; text-align:center; padding:60px 0;}
  .error{color:var(--pink);}
  input[type=password]{
    background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text);
    padding:10px 14px; border-radius:10px; font-family:'JetBrains Mono',monospace; font-size:13px;
    margin-right:8px;
  }
  button{
    background:linear-gradient(135deg,var(--violet),var(--cyan)); border:none; color:#fff;
    padding:10px 18px; border-radius:10px; font-weight:600; cursor:pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Inbox</h1>
  <p class="sub">/api/messages — contact form submissions</p>

  <div id="gate" style="margin-bottom:28px;">
    <input type="password" id="keyInput" placeholder="Admin key">
    <button id="loadBtn">Load messages</button>
  </div>

  <div id="results"></div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const prefilledKey = params.get('key') || '';
  document.getElementById('keyInput').value = prefilledKey;

  async function loadMessages() {
    const key = document.getElementById('keyInput').value.trim();
    const results = document.getElementById('results');
    results.innerHTML = '<p class="empty">Loading…</p>';
    try {
      const res = await fetch('/api/messages?key=' + encodeURIComponent(key));
      const data = await res.json();
      if (!res.ok) {
        results.innerHTML = `<p class="error">${data.error || 'Unauthorized'}</p>`;
        return;
      }
      if (!data.messages.length) {
        results.innerHTML = '<p class="empty">No messages yet.</p>';
        return;
      }
      results.innerHTML = data.messages.map(m => `
        <div class="card">
          <div class="top">
            <div><span class="name">${escapeHtml(m.name)}</span><span class="email">${escapeHtml(m.email)}</span></div>
            <span class="date">${new Date(m.createdAt).toLocaleString()}</span>
          </div>
          <div class="msg">${escapeHtml(m.message)}</div>
        </div>
      `).join('');
    } catch (err) {
      results.innerHTML = '<p class="error">Could not reach the server.</p>';
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  document.getElementById('loadBtn').addEventListener('click', loadMessages);
  if (prefilledKey) loadMessages();
</script>
</body>
</html>
